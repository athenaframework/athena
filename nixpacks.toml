[phases.setup]
nixPkgs = ["nodejs_20", "python311", "python311Packages.pip"]

[phases.install]
cmds = [
  "python -m venv --copies /opt/venv && . /opt/venv/bin/activate && pip install -r requirements-railway.txt"
]

[phases.build]
cmds = [
  "cd dashboard && npm install && npm run build"
]

[start]
cmd = "uvicorn backend.dashboard_api:app --host 0.0.0.0 --port $PORT"
