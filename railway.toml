[build]
builder = "NIXPACKS"
buildCommand = "cd dashboard && npm install && npm run build && cd /app && pip install -r requirements-railway.txt"

[deploy]
startCommand = "uvicorn backend.dashboard_api:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/api/status"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"

[[services]]
name = "athena-dashboard"
